      .filters, .cards, .grid, .top-panels { display: grid; gap: 12px; }
      .filters { grid-template-columns: minmax(220px, 1.4fr) repeat(4, minmax(130px, 1fr)) 100px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 14px; backdrop-filter: blur(14px); }
      label span { display: block; color: #8fdff1; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
      input, select, button { font: inherit; }
      input, select { width: 100%; height: 38px; border: 1px solid rgba(255,255,255,.14); border-radius: 7px; padding: 0 10px; background: rgba(5,8,10,.78); color: var(--ink); outline: none; }
      input:focus, select:focus { border-color: rgba(20,216,255,.7); box-shadow: 0 0 0 3px rgba(20,216,255,.14); }

      button:hover { border-color: rgba(20,216,255,.58); color: #fff; box-shadow: 0 0 18px rgba(20,216,255,.16); }
      .cards { grid-template-columns: repeat(4, 1fr); margin-bottom: 14px; }

      .card span { color: #8fdff1; font-size: 12px; text-transform: uppercase; font-weight: 900; }
      .card strong { display: block; font-size: 34px; margin-top: 8px; line-height: 1; }
      .card small { display: block; color: var(--muted); margin-top: 8px; }
      .grid { grid-template-columns: minmax(0,1fr) 420px; align-items: start; }
      .left { display: grid; gap: 12px; min-width: 0; }
      .top-panels { grid-template-columns: .8fr 1.2fr; }
      .panel { padding: 16px; }
      .panel h2, aside h2, .section h3 { margin: 0; }

      .green { background: linear-gradient(90deg, var(--green), #7cffb9); }

      .red { background: linear-gradient(90deg, var(--red), #ff8b60); }
      .legend { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 14px; }

      .ranking { display: grid; gap: 8px; margin-top: 14px; }

      th { text-align: left; color: #8fdff1; text-transform: uppercase; font-size: 11px; padding: 0 10px 10px; border-bottom: 1px solid var(--line); }

      aside { position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow: auto; }

      .project-meta { display: flex; justify-content: space-between; font-size: 12px; margin-top: 7px; }
      .rating-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .rating-item { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: #fff; }
      .rating-item strong { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; }

      .rating-pill.good { background: var(--green-bg); color: var(--green); }
      .rating-pill.mid { background: var(--yellow-bg); color: var(--yellow); }
      .rating-pill.low { background: var(--red-bg); color: var(--red); }
      .rating-scale { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
      .rating-scale span { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 7px; padding: 9px; color: var(--muted); font-size: 12px; font-weight: 800; }
      .guideline-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
      .guideline-grid article, .rating-item { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: rgba(255,255,255,.045); }
      .guideline-grid strong { display: block; font-size: 13px; }
      .guideline-grid p { margin: 6px 0 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
      ul { margin: 0; padding: 0; list-style: none; display: grid; gap: 7px; }
      li { padding: 9px; border-radius: 7px; font-size: 12px; line-height: 1.35; }
      .risk li { background: var(--red-bg); color: #68231f; }
      .opp li { background: var(--green-bg); color: #0f5e3c; }
      .notes p { margin: 0; padding: 10px; background: rgba(255,255,255,.06); border-radius: 7px; font-size: 13px; line-height: 1.4; }
      @media (max-width: 1150px) { .grid, .top-panels { grid-template-columns: 1fr; } aside { position: static; max-height: none; } .filters { grid-template-columns: repeat(2,1fr); } .brand-lockup { grid-template-columns: 240px minmax(0, 1fr); } .brand-logo { width: 240px; } }
      @media (max-width: 760px) { .shell { grid-template-columns: 1fr; } nav { display: flex; position: sticky; top: 0; z-index: 2; } main { padding: 14px; } header, .detail-head, .project-top, .project-meta { flex-direction: column; } .brand-lockup, .cards, .filters, .legend, .rating-grid, .rating-scale, .guideline-grid { grid-template-columns: 1fr; } .brand-logo { width: 100%; } }

        }
      ];

      const weights = { milestones: .25, projects: .25, relationship: .2, activity: .1, riskScore: .1, engagement: .1 };
      const ratingDimensions = [
        { key: "csm", label: "Engagement with CSM", short: "CSM", guidance: "How proactively the partner works with CSM, follows escalation paths and uses Oracle resources correctly." },
        { key: "customer", label: "Engagement with customer", short: "Customer", guidance: "Governance, status cadence, RACI, steering participation and transparent risk communication." },
        { key: "support", label: "Engagement with support", short: "Support", guidance: "Support policy knowledge, SR prioritization, escalation discipline and collaboration with support engineers." },
        { key: "scope", label: "Scope setting and management", short: "Scope", guidance: "Clear scope, controlled changes, realistic milestones and delivery discipline." },
        { key: "competency", label: "Product, industry or domain competency", short: "Competency", guidance: "Trained resources, Oracle Cloud experience, domain knowledge, low churn and use of enablement channels." },
        { key: "methodology", label: "Methodology", short: "Methodology", guidance: "Solution-driven implementation, low customization dependency, complete plan for testing, migration, adoption and operations." },
        { key: "transition", label: "Transition to ownership and adoption", short: "Transition", guidance: "Post go-live support, knowledge transfer, customer ownership, sustainment plan and adoption tracking." }
      ];
      const state = { selected: "terra", filters: { q: "", region: "all", specialty: "all", product: "all", temp: "all" } };

      const $ = (id) => document.getElementById(id);
      const uniq = (items) => [...new Set(items)].sort();
      const riskScore = (n) => n <= 0 ? 100 : n === 1 ? 80 : n === 2 ? 60 : n === 3 ? 40 : 20;
      const score = (p) => Math.round(p.signals.milestones * weights.milestones + p.signals.projects * weights.projects + p.signals.relationship * weights.relationship + p.signals.activity * weights.activity + riskScore(p.signals.risks) * weights.riskScore + p.signals.engagement * weights.engagement);
      const temp = (s) => s >= 75 ? "green" : s >= 50 ? "yellow" : "red";
      const ratingAvg = (p) => Number((ratingDimensions.reduce((sum, dimension) => sum + p.ratings[dimension.key], 0) / ratingDimensions.length).toFixed(1));
      const ratingClass = (value) => value >= 4 ? "good" : value >= 3 ? "mid" : "low";
      const ratingLabel = (value) => value >= 4.5 ? "Excellent" : value >= 3.7 ? "Successful" : value >= 2.7 ? "Minimum" : value >= 1.7 ? "Ineffective" : "Poor";
      const esc = (v) => String(v).replace(/[&<>"']/g, (m) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m]));
      const options = (values, selected, all) => `<option value="all">${all}</option>${values.map(v => `<option ${v === selected ? "selected" : ""}>${esc(v)}</option>`).join("")}`;

      function enriched() {
        return partners.map(p => ({ ...p, score: score(p), temp: temp(score(p)), riskScore: riskScore(p.signals.risks), ratingAvg: ratingAvg(p) }));
      }
      function filtered() {
        return enriched().filter(p => {
          const text = [p.name, p.region, p.specialty, p.status, ...p.products, ...p.clients].join(" ").toLowerCase();
          return (!state.filters.q || text.includes(state.filters.q.toLowerCase()))
            && (state.filters.region === "all" || p.region === state.filters.region)
            && (state.filters.specialty === "all" || p.specialty === state.filters.specialty)
            && (state.filters.product === "all" || p.products.includes(state.filters.product))
            && (state.filters.temp === "all" || p.temp === state.filters.temp);
        });
      }
      function tempBadge(p) {
        const label = { green: "Verde", yellow: "Amarilla", red: "Roja" }[p.temp];
        return `<span class="temp ${p.temp}">${label} ${p.score}</span>`;
      }
      function ratingBadge(value) {
        return `<span class="rating-pill ${ratingClass(value)}">${value}</span>`;
      }
      function render() {
        const data = enriched();
        const rows = filtered();
        const selected = data.find(p => p.id === state.selected) || rows[0] || data[0];
        const sorted = [...rows].sort((a,b) => a.score - b.score);
        const counts = { green: rows.filter(p => p.temp === "green").length, yellow: rows.filter(p => p.temp === "yellow").length, red: rows.filter(p => p.temp === "red").length };
        const avg = rows.length ? Math.round(rows.reduce((s,p) => s + p.score, 0) / rows.length) : 0;
        const avgRating = rows.length ? (rows.reduce((s,p) => s + p.ratingAvg, 0) / rows.length).toFixed(1) : "0.0";
        const total = Math.max(rows.length, 1);
        const regions = uniq(data.map(p => p.region));
        const specialties = uniq(data.map(p => p.specialty));
        const products = uniq(data.flatMap(p => p.products));

        $("app").innerHTML = `
          <div class="shell">
            <nav>
              <div class="mark">OP</div>
              <a class="active" href="#" title="Dashboard">D</a>
              <a href="#partners" title="Partners">P</a>
              <a href="#scoring" title="Scoring">S</a>
            </nav>
            <main>
              <header>
                <div class="brand-lockup">
                  <img class="brand-logo" src="./assets/oracle-partner-pulse-logo.png" alt="Oracle Partner Pulse logo" />
                  <div>
                  <h1>Oracle SaaS Partner Pulse</h1>
                  <p>Observabilidad CSM para partners activos, proyectos, relacion con clientes, temperatura y senales operativas.</p>
                  </div>
                </div>
                <span class="demo-chip">Demo hackathon · datos manuales</span>
              </header>
              <section class="filters">
                <label><span>Buscar</span><input id="q" value="${esc(state.filters.q)}" placeholder="Partner, cliente, producto..." /></label>
                <label><span>Region</span><select id="region">${options(regions, state.filters.region, "Todas")}</select></label>
                <label><span>Especialidad</span><select id="specialty">${options(specialties, state.filters.specialty, "Todas")}</select></label>
                <label><span>Producto</span><select id="product">${options(products, state.filters.product, "Todos")}</select></label>
                <label><span>Temperatura</span><select id="temp"><option value="all">Todas</option><option value="green" ${state.filters.temp === "green" ? "selected" : ""}>Verde</option><option value="yellow" ${state.filters.temp === "yellow" ? "selected" : ""}>Amarilla</option><option value="red" ${state.filters.temp === "red" ? "selected" : ""}>Roja</option></select></label>
                <button id="reset">Limpiar</button>
              </section>
              <section class="cards">
                <div class="card"><span>Partners activos</span><strong>${rows.length}</strong><small>${rows.reduce((s,p) => s + p.projects.length, 0)} proyectos en seguimiento</small></div>
                <div class="card"><span>Rating promedio</span><strong>${avgRating}</strong><small>Escala 1-5 segun guideline</small></div>
                <div class="card"><span>Partners en riesgo</span><strong style="color:var(--red)">${counts.red}</strong><small>${rows.reduce((s,p) => s + p.signals.risks, 0)} riesgos abiertos</small></div>
                <div class="card"><span>Clientes vinculados</span><strong>${uniq(rows.flatMap(p => p.clients)).length}</strong><small>Relaciones activas CSM</small></div>
              </section>
              <div class="grid">
                <div class="left">
                  <div class="top-panels">
                    <section class="panel">
                      <h2>Temperatura del equipo</h2>
                      <p>Lectura consolidada para priorizar acompanamiento.</p>
                      <div class="stack"><i class="green" style="width:${counts.green / total * 100}%"></i><i class="yellow" style="width:${counts.yellow / total * 100}%"></i><i class="red" style="width:${counts.red / total * 100}%"></i></div>
                      <div class="legend"><span>Verde <b>${counts.green}</b></span><span>Amarilla <b>${counts.yellow}</b></span><span>Roja <b>${counts.red}</b></span></div>
                    </section>
                    <section class="panel">
                      <h2>Prioridad CSM</h2>
                      <p>Ordenado por temperatura y score.</p>
                      <div class="ranking">${sorted.slice(0,5).map((p,i) => `<button class="rank-row ${p.id === selected.id ? "selected" : ""}" data-p="${p.id}"><b>${i+1}</b><span><strong>${esc(p.name)}</strong><small>${esc(p.region)} · ${esc(p.specialty)}</small></span>${tempBadge(p)}</button>`).join("")}</div>
                    </section>
                  </div>
                  <section class="panel" id="partners">
                    <h2>Partners activos</h2>
                    <p>Filtro por region, especialidad, producto y temperatura.</p>
                    <div class="table-wrap">
                      <table>
                        <thead><tr><th>Partner</th><th>Region</th><th>Especialidad</th><th>Productos</th><th>Clientes</th><th>Estado</th><th>Rating</th><th>Temp.</th></tr></thead>
                        <tbody>${rows.map(p => `<tr class="${p.id === selected.id ? "selected" : ""}" data-p="${p.id}"><td><strong>${esc(p.name)}</strong><small>Owner CSM: ${esc(p.owner)}</small></td><td>${esc(p.region)}</td><td>${esc(p.specialty)}</td><td>${p.products.map(x => `<span class="chip">${esc(x)}</span>`).join("")}</td><td>${p.clients.map(esc).join("<br>")}</td><td>${esc(p.status)}</td><td>${ratingBadge(p.ratingAvg)}</td><td>${tempBadge(p)}</td></tr>`).join("")}</tbody>
                      </table>
                    </div>
                  </section>
                  <section class="panel" id="scoring">
                    <h2>Partner Rating capability</h2>
                    <p>Basado en el guideline: rating 1-5 por dimensiones de engagement, soporte, alcance, competencia, metodologia y transicion a adopcion.</p>
                    <div class="rating-scale">
                      <span>1 Poor / Failed</span>
                      <span>2 Ineffective</span>
                      <span>3 Minimum / Fair</span>
                      <span>4 Successful</span>
                      <span>5 Excellent</span>
                    </div>
                    <div class="guideline-grid">
                      ${ratingDimensions.map(dimension => `<article><strong>${esc(dimension.label)}</strong><p>${esc(dimension.guidance)}</p></article>`).join("")}
                    </div>
                  </section>
                </div>
                <aside>
                  <div class="detail-head">
                    <div><h2>${esc(selected.name)}</h2><p>${esc(selected.region)} · ${esc(selected.specialty)}</p></div>
                    ${tempBadge(selected)}
                  </div>
                  <div class="section">
                    <div class="section-title"><h3>Score breakdown</h3><span>Factores ponderados</span></div>
                    ${[
                      ["Hitos", selected.signals.milestones, 25],
                      ["Proyectos", selected.signals.projects, 25],
                      ["Clientes", selected.signals.relationship, 20],
                      ["Actividad", selected.signals.activity, 10],
                      ["Riesgo", selected.riskScore, 10],
                      ["Compromiso", selected.signals.engagement, 10],
                    ].map(([label, value, weight]) => `<div class="score-row"><div><strong>${label}</strong><span>${weight}% · valor ${value}</span></div><div class="bar"><i style="width:${value}%"></i></div></div>`).join("")}
                  </div>
                  <div class="section">
                    <div class="section-title"><h3>Partner Rating</h3><span>${ratingLabel(selected.ratingAvg)} · promedio ${selected.ratingAvg}</span></div>
                    <div class="rating-grid">
                      ${ratingDimensions.map(dimension => `<div class="rating-item"><strong>${esc(dimension.short)} ${ratingBadge(selected.ratings[dimension.key])}</strong><p>${esc(dimension.guidance)}</p></div>`).join("")}
                    </div>
                  </div>
                  <div class="section">
                    <div class="section-title"><h3>Active projects</h3><span>Avance e hitos</span></div>
                    ${selected.projects.map(pr => `<div class="project"><div class="project-top"><div><strong>${esc(pr.name)}</strong><small>${esc(pr.client)} · ${esc(pr.product)}</small></div><b>${esc(pr.status)}</b></div><div class="bar" style="margin-top:10px"><i style="width:${pr.progress}%"></i></div><div class="project-meta"><span>${pr.progress}% avance</span><span>${pr.milestones.map(esc).join(" · ")}</span></div></div>`).join("")}
                  </div>
                  <div class="section">
                    <div class="section-title"><h3>Senales de riesgo</h3><span>${selected.signals.risks} abiertas</span></div>
                    <ul class="risk">${selected.risks.length ? selected.risks.map(r => `<li>${esc(r)}</li>`).join("") : "<li>Sin riesgos abiertos registrados.</li>"}</ul>
                  </div>
                  <div class="section">
                    <div class="section-title"><h3>Oportunidades operativas</h3><span>Adopcion y enablement</span></div>
                    <ul class="opp">${selected.opportunities.map(o => `<li>${esc(o)}</li>`).join("")}</ul>
                  </div>
                  <div class="section notes">
                    <div class="section-title"><h3>Notas CSM</h3><span>Manual</span></div>
                    <p>${esc(selected.note)}</p>
                  </div>
                </aside>
              </div>
            </main>
          </div>
        `;

        ["q", "region", "specialty", "product", "temp"].forEach(id => {
          $(id).addEventListener(id === "q" ? "input" : "change", (event) => {
            state.filters[id] = event.target.value;
            render();
          });
        });
        $("reset").addEventListener("click", () => {
          state.filters = { q: "", region: "all", specialty: "all", product: "all", temp: "all" };
          render();
        });
        document.querySelectorAll("[data-p]").forEach(el => el.addEventListener("click", () => {
          state.selected = el.dataset.p;
          render();
        }));
      }
      render();
    </script>
  </body>
</html>
